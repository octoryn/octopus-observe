name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    name: verify (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Node 20 proves the core runs with no built-in SQLite (those tests
        # self-skip); 22 and 24 exercise the node:sqlite adapter too.
        node: ["20", "22", "24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Package smoke
        run: npm run release:smoke
